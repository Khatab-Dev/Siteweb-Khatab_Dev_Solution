<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H2O_TECH - Boutique</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <!-- Intégration de Bootstrap pour le style (optionnel) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- En-tête du site -->
    <header class="bg-primary text-white text-center py-4">
        <h1>Boutique H2O_TECH</h1>
        <p>Découvrez nos produits et accessoires</p>
    </header>

    <!-- Barre de navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">H2O_TECH</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">Accueil</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="about.html">À propos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="services.html">Services</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="shop.html">Boutique</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="contact.html">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Section des produits -->
    <section id="shop" class="container my-5">
        <h2 class="text-center mb-4">Nos Produits</h2>

        <!-- Filtres et recherche (optionnel) -->
        <div class="row mb-4">
            <div class="col-md-6">
                <input type="text" class="form-control" placeholder="Rechercher un produit..." id="searchInput">
            </div>
            <div class="col-md-6">
                <select class="form-control" id="categoryFilter">
                    <option value="">Toutes les catégories</option>
                    <option value="accessoires">Accessoires informatiques</option>
                    <option value="librairie">Matériels pour la librairie</option>
                    <option value="rafraichissements">Rafraîchissements</option>
                </select>
            </div>
        </div>

        <!-- Grille des produits -->
        <div class="row" id="products-container">
            <!-- Les produits seront injectés ici par JavaScript -->
        </div>
    </section>

    <!-- Pied de page -->
    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2025 H2O_TECH. Tous droits réservés.</p>
        <p>Contactez-nous : <a href="mailto:contact@h2otech.com" class="text-white">contact@h2otech.com</a></p>
    </footer>

    <!-- Scripts JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/shop.js"></script>
</body>
</html>
