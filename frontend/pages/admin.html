<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>H2O_TECH - Services</title>
        <link rel="stylesheet" href="../assets/css/styles.css">
        <!-- Intégration de Bootstrap pour le style (optionnel) -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <!-- En-tête du site -->
        <header class="bg-primary text-white text-center py-4">
            <h1>Bienvenue chez H2O_TECH</h1>
            <p>Votre partenaire en reprographie, informatique et commerce</p>
        </header>
        <!-- Formulaire d'ajout de service -->
        <section id="admin" class="container my-5">
            <h2 class="text-center mb-4">Ajouter un nouveau service</h2>
            <form id="addServiceForm">
                <div class="mb-3">
                    <label for="title" class="form-label">Titre</label>
                    <input type="text" class="form-control" id="title" name="title" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" required></textarea>
                </div>
                <div class="mb-3">
                    <label for="image" class="form-label">URL de l'image</label>
                    <input type="text" class="form-control" id="image" name="image" required>
                </div>
                <div class="mb-3">
                    <label for="price" class="form-label">Prix</label>
                    <input type="number" step="0.01" class="form-control" id="price" name="price" required>
                </div>
                <div class="mb-3">
                    <label for="category" class="form-label">Catégorie</label>
                    <select class="form-control" id="category" name="category" required>
                        <option value="reprographie">Reprographie</option>
                        <option value="informatique">Informatique</option>
                        <option value="commerce">Commerce</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Ajouter le service</button>
            </form>
        </section>
        <!-- Pied de page -->
        <footer class="bg-dark text-white text-center py-3">
            <p>&copy; 2025 H2O_TECH. Tous droits réservés.</p>
            <p>Contactez-nous : <a href="mailto:oohatab.com" class="text-white">oohatab.com</a></p>
        </footer>
        <!-- Scripts JavaScript -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="../assets/js/scripts.js"></script>
    </body>
</html>
